name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore CodeGraph.sln

      - name: Build
        run: dotnet build CodeGraph.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test CodeGraph.sln --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/results.trx'

  pack:
    name: Pack NuGet
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Pack
        run: dotnet pack src/CodeGraph.Indexer/CodeGraph.Indexer.csproj --configuration Release --output ./nupkg

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: |
            ./nupkg/*.nupkg
            ./nupkg/*.snupkg
