name: Publish to NuGet

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest
    steps:
      - name: Ensure release tag is on main
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.payload.release.tag_name;
            const ref = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `tags/${tag}`
            });
            const commit = ref.data.object.sha;
            const branch = await github.rest.repos.getBranch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              branch: 'main'
            });
            const mainCommits = await github.rest.repos.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: 'main',
              per_page: 100
            });
            const onMain = mainCommits.data.some(c => c.sha === commit);
            if (!onMain) {
              core.setFailed(`Tag ${tag} (${commit}) is not on main branch`);
            }

  publish:
    name: Pack & Publish
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Restore & Pack
        run: dotnet pack src/CodeGraph.Indexer/CodeGraph.Indexer.csproj --configuration Release --output ./nupkg -p:Version=${{ steps.version.outputs.VERSION }}

      - name: Push to NuGet.org
        run: |
          dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
          dotnet nuget push ./nupkg/*.snupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Push to GitHub Packages
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.GITHUB_TOKEN }} --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json --skip-duplicate
