name: Mark PR ready when labeled complete

on:
  pull_request:
    types: [labeled]

permissions:
  pull-requests: write

jobs:
  mark-ready:
    if: github.event.label.name == 'complete' && github.event.pull_request.draft == true
    runs-on: ubuntu-latest
    steps:
      - name: Mark PR as ready for review
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr ready ${{ github.event.pull_request.number }} --repo ${{ github.repository }}
